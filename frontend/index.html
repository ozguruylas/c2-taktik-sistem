<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Tactical Command Center</title>
    
    <!-- 
      =========================================================================
      1. VENDOR CSS (EXTERNAL LIBRARIES)
      =========================================================================
      Leaflet.js CSS: Core rendering engine for the tactical map.
    -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- 
      =========================================================================
      2. APPLICATION CSS
      =========================================================================
      Custom military-grade dark theme and animation definitions.
    -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- 
      =========================================================================
      APP SHELL: TOP NAVIGATION BAR
      =========================================================================
    -->
    <div class="header">
        <h1>C2 TAKTIK EKRANI</h1>
        <!-- Real-time network status indicator (Updated via app.js) -->
        <div class="status">SISTEM: BAGLANTI BEKLENIYOR...</div>
    </div>
    
    <div class="container">
        
        <!-- 
          =====================================================================
          LEFT PANEL: OPERATOR CONTROLS & FLEET TELEMETRY
          =====================================================================
        -->
        <div class="sidebar">
            <h2>FILO DURUMU</h2>
            
            <!-- UAV DEPLOYMENT MODULE -->
            <div class="add-drone-panel">
                <input type="text" id="yeni-cagri-kodu" placeholder="Cagri Kodu (Orn: AKINCI-1)">
                
                <select id="yeni-model">
                    <option value="Bayraktar TB2">Bayraktar TB2</option>
                    <option value="Akinci">Akinci</option>
                    <option value="Kizilelma">Kizilelma</option>
                </select>

                <!-- WAYPOINT ALLOCATION MODULE -->
                <select id="yeni-hedef">
                    <option value="41.0082,28.9784">Istanbul (Kuzeybati Sektoru)</option>
                    <option value="36.2000,36.1667">Hatay (Guney Siniri)</option>
                    <option value="38.4192,27.1287">Izmir (Ege Kiyilari)</option>
                    <option value="39.9207,41.2679">Erzurum (Dogu Sektoru)</option>
                </select>

                <button class="btn-add" onclick="yeniIhaFirlat()">[ SISTEME YENI IHA EKLE ]</button>
            </div>
            
            <hr class="panel-divider">

            <!-- REAL-TIME UAV DATA CARDS CONTAINER -->
            <div id="drone-list" class="drone-list">
                <!-- Data populated dynamically via app.js (ekranaCiz function) -->
                <div class="drone-card">Veri Baglantisi Bekleniyor...</div>
            </div>
        </div>

        <!-- 
          =====================================================================
          MAIN PANEL: TACTICAL RADAR SIMULATION
          =====================================================================
        -->
        <div class="main-map" id="map" style="width: 100%; height: 100%;">
            <!-- Leaflet.js engine injects map tiles and SVG overlays here -->
        </div>
    </div>

    <!-- 
      =========================================================================
      JAVASCRIPT DEPENDENCIES & APPLICATION LOGIC
      =========================================================================
    -->
    
    <!-- 1. Map Engine -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 2. STOMP over WebSocket Protocol libraries for real-time telemetry -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <!-- 3. Core Business Logic (Must load last to ensure DOM is ready) -->
    <script src="app.js"></script>
</body>
</html>
